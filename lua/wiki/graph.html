<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Brain</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Linux Libertine','Georgia',serif;background:#f8f9fa;color:#202122;height:100vh;display:flex;flex-direction:column}

header{background:#fff;border-bottom:1px solid #a2a9b1;padding:12px 28px;display:flex;align-items:baseline;gap:14px;flex-shrink:0}
header h1{font-size:1.5rem;font-weight:normal;letter-spacing:.02em}
header span{color:#54595d;font-size:.9rem}

.main{flex:1;overflow:hidden;display:flex}
.left{flex:1;overflow-y:auto;min-width:0}
.section{max-width:1120px;margin:0 auto;padding:24px}
h2{font-size:.8rem;font-weight:bold;border-bottom:1px solid #a2a9b1;padding-bottom:4px;margin-bottom:14px;text-transform:uppercase;letter-spacing:.07em;color:#54595d}

.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(175px,1fr));gap:10px;margin-bottom:32px}
.card{background:#fff;border:1px solid #a2a9b1;border-radius:2px;padding:12px;cursor:pointer;transition:box-shadow .15s}
.card:hover{box-shadow:0 2px 8px rgba(0,0,0,.12)}
.card-title{font-weight:bold;font-size:.9rem;margin-bottom:5px;color:#3366cc}
.card-blurb{font-size:.8rem;color:#54595d;line-height:1.4}

/* ── Graph ── */
#graph-wrap{background:#1a1b1e;border-radius:4px;margin-bottom:32px;position:relative;height:520px;overflow:hidden;cursor:grab}
#graph-wrap.panning{cursor:grabbing}
#graph-wrap svg{width:100%;height:100%;display:block}

.link{stroke:#3a3d45;stroke-width:1px;transition:stroke .2s}
.link.highlighted{stroke:#7b9fd4;stroke-width:2px}

.node circle{cursor:pointer;transition:r .2s}
.node text{font-size:11px;fill:#d0d3db;pointer-events:none;font-family:sans-serif}
.node.focused circle{stroke:#7b9fd4;stroke-width:2.5px}

/* ── Tooltip snap ── */
#snap{position:absolute;top:10px;left:50%;transform:translateX(-50%);background:rgba(30,32,36,.92);border:1px solid #3a3d45;border-radius:4px;padding:8px 13px;max-width:260px;font-size:.82rem;display:none;pointer-events:none;text-align:center}
#snap .t{color:#d0d3db;font-weight:bold;margin-bottom:3px}
#snap .b{color:#8a8d95;font-size:.78rem;line-height:1.35}

/* ── Controls ── */
#controls{position:absolute;bottom:12px;right:12px;background:rgba(30,32,36,.95);border:1px solid #3a3d45;border-radius:4px;padding:10px 12px;width:190px;font-size:.8rem;color:#d0d3db}
#controls-toggle{position:absolute;bottom:12px;right:12px;background:rgba(30,32,36,.85);border:1px solid #3a3d45;border-radius:4px;padding:5px 10px;color:#8a8d95;font-size:.78rem;cursor:pointer}
#controls-toggle:hover{color:#d0d3db}
.ctrl-title{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;font-weight:bold;font-size:.79rem;color:#a0a3ab}
.ctrl-title button{background:none;border:none;color:#8a8d95;cursor:pointer;font-size:.9rem;padding:0 2px}
.ctrl-row{margin-bottom:7px}
.ctrl-label{display:flex;justify-content:space-between;margin-bottom:3px;font-size:.78rem;color:#a0a3ab}
.ctrl-val{color:#7b9fd4;font-weight:bold}
input[type=range]{width:100%;height:3px;accent-color:#7b9fd4;cursor:pointer}

/* ── Table ── */
table{width:100%;border-collapse:collapse;background:#fff;font-size:.86rem}
th{text-align:left;padding:7px 12px;background:#eaecf0;border:1px solid #a2a9b1;font-weight:bold}
td{padding:6px 12px;border-bottom:1px solid #eaecf0;vertical-align:top}
tr:hover td{background:#eaf3fb}
tr.hl td{background:#fef9c3}
.note-name{color:#3366cc;cursor:pointer;font-weight:500;white-space:nowrap}
.tag{display:inline-block;background:#eaecf0;border-radius:2px;padding:1px 6px;margin:2px 2px 2px 0;font-size:.78rem;cursor:pointer;color:#3366cc}
.tag:hover{background:#c8ccd1}
.dim{color:#a2a9b1}

/* ── Reader panel ── */
#reader{width:0;flex-shrink:0;background:#fff;border-left:1px solid #a2a9b1;overflow:hidden;transition:width .25s ease;display:flex;flex-direction:column}
#reader.open{width:420px}
#reader.fullscreen{position:fixed;inset:0;width:100vw!important;max-width:100vw;border:none;z-index:100;transition:none}
#reader-header{padding:14px 16px;border-bottom:1px solid #eaecf0;display:flex;align-items:center;gap:8px;flex-shrink:0}
#reader-title{font-size:1.1rem;font-weight:bold;color:#202122;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
#reader-nvim,#reader-fs,#reader-close{background:none;border:none;font-size:1.1rem;cursor:pointer;color:#54595d;line-height:1;padding:2px 6px;border-radius:3px;flex-shrink:0}
#reader-nvim:hover,#reader-fs:hover,#reader-close:hover{background:#eaecf0;color:#202122}
#reader-nvim{font-size:.85rem;font-family:sans-serif;color:#3366cc;border:1px solid #c8ccd1;padding:2px 8px}
#reader-nvim:hover{background:#eaf3fb;border-color:#3366cc}
#reader-body{flex:1;overflow-y:auto;padding:20px 24px}
#reader.fullscreen #reader-body{max-width:none;margin:0;width:100%}
#reader-body h1{font-size:1.3rem;margin:0 0 12px}
#reader-body h2{font-size:1.05rem;margin:18px 0 8px;border-bottom:1px solid #eaecf0;padding-bottom:4px;text-transform:none;letter-spacing:0;color:#202122}
#reader-body h3{font-size:.95rem;margin:14px 0 6px}
#reader-body p{margin:0 0 12px;line-height:1.7;font-size:.93rem}
#reader-body ul,#reader-body ol{margin:0 0 12px 22px}
#reader-body li{line-height:1.7;font-size:.93rem;margin-bottom:4px}
#reader-body .wikilink{color:#3366cc;cursor:pointer;text-decoration:none}
#reader-body .wikilink:hover{text-decoration:underline}
#reader-body .math-inline{font-style:italic;color:#333;background:#f8f8f8;padding:1px 4px;border-radius:2px;font-family:serif}
#reader-body .math-block{display:block;background:#f8f8f8;border-left:3px solid #a2a9b1;padding:8px 12px;margin:10px 0;font-style:italic;font-family:serif;overflow-x:auto;white-space:pre}
#reader-body blockquote{border-left:3px solid #a2a9b1;margin:10px 0;padding:4px 12px;color:#54595d;font-style:italic}
#reader-body hr{border:none;border-top:1px solid #eaecf0;margin:14px 0}
#reader-links{padding:12px 16px;border-top:1px solid #eaecf0;flex-shrink:0;font-size:.82rem}
#reader.fullscreen #reader-links{max-width:none;margin:0;width:100%}
#reader-links h3{font-size:.75rem;font-weight:bold;text-transform:uppercase;letter-spacing:.07em;color:#54595d;margin-bottom:6px}
#reader-links .link-row{margin-bottom:10px}
#reader-links .rtag{display:inline-block;background:#eaecf0;border-radius:2px;padding:2px 8px;margin:2px;font-size:.8rem;cursor:pointer;color:#3366cc}
#reader-links .rtag:hover{background:#c8ccd1}
.rnone{color:#a2a9b1;font-style:italic}
</style>
</head>
<body>
<header>
  <h1>&#x1F9E0; Brain</h1>
  <span id="stats">Loading&hellip;</span>
</header>
<div class="main">
<div class="left"><div class="section">

<h2>Featured</h2>
<div class="cards" id="cards"></div>

<h2>Graph</h2>
<div id="graph-wrap">
  <svg id="svg"><g id="g"><g id="links-g"></g><g id="nodes-g"></g></g></svg>
  <div id="snap"><div class="t" id="snap-t"></div><div class="b" id="snap-b"></div></div>
  <div id="controls">
    <div class="ctrl-title">
      <span>Graph Settings</span>
      <button onclick="document.getElementById('controls').style.display='none';document.getElementById('controls-toggle').style.display='block'">&#x2715;</button>
    </div>
    <div class="ctrl-row">
      <div class="ctrl-label"><span>Repulsion</span><span class="ctrl-val" id="rv">500</span></div>
      <input type="range" id="s-repulse" min="50" max="1200" value="500">
    </div>
    <div class="ctrl-row">
      <div class="ctrl-label"><span>Link Distance</span><span class="ctrl-val" id="ldv">160</span></div>
      <input type="range" id="s-dist" min="20" max="400" value="160">
    </div>
    <div class="ctrl-row">
      <div class="ctrl-label"><span>Center Force</span><span class="ctrl-val" id="cfv">35</span></div>
      <input type="range" id="s-center" min="1" max="100" value="35">
    </div>
    <div class="ctrl-row">
      <div class="ctrl-label"><span>Node Size</span><span class="ctrl-val" id="nsv">10</span></div>
      <input type="range" id="s-size" min="3" max="24" value="10">
    </div>
    <div class="ctrl-row">
      <div class="ctrl-label"><span>Labels</span></div>
      <button id="btn-labels" style="width:100%;background:#3a3d45;border:1px solid #5a5d65;border-radius:3px;color:#d0d3db;padding:3px 0;cursor:pointer;font-size:.8rem">On</button>
    </div>
  </div>
  <button id="controls-toggle" onclick="document.getElementById('controls').style.display='block';this.style.display='none'">&#x2699; Settings</button>
</div>

<h2>All Notes</h2>
<table><thead><tr><th>Note</th><th>Links to</th></tr></thead>
<tbody id="notes-tbody"></tbody></table>

</div></div>

<div id="reader">
  <div id="reader-header">
    <span id="reader-title"></span>
    <button id="reader-nvim" onclick="openInNeovim()" title="Open in Neovim">&#x2197; Neovim</button>
    <button id="reader-fs" onclick="toggleFullscreen()" title="Fullscreen">&#x26F6;</button>
    <button id="reader-close" onclick="closeReader()" title="Close">&#x2715;</button>
  </div>
  <div id="reader-body"></div>
  <div id="reader-links">
    <div class="link-row"><h3>Wikilinks</h3><div id="reader-out"></div></div>
    <div class="link-row"><h3>Backlinks</h3><div id="reader-in"></div></div>
  </div>
</div>
</div>

<script>
// ── DOM refs ───────────────────────────────────────────────────────────────
const wrap   = document.getElementById('graph-wrap');
const svg    = document.getElementById('svg');
const gEl    = document.getElementById('g');
const linksG = document.getElementById('links-g');
const nodesG = document.getElementById('nodes-g');
const NS = 'http://www.w3.org/2000/svg';
const W = svg.clientWidth, H = svg.clientHeight;

// ── Physics params ─────────────────────────────────────────────────────────
let REPULSE   = 500;
let LINK_DIST = 160;
let CENTER_F  = 0.035;
let BASE_R    = 10;
let LABEL_MODE = 1;

// ── Persistent state across data refreshes ─────────────────────────────────
const nodePositions = new Map();
let currentNodeId = null;

// ── Current graph state ────────────────────────────────────────────────────
let rawNodes = [], rawEdges = [];
let nodeById = {}, backlinks = {};
let nodes = [], links = [], lc = {};
let lineEls = [], nodeEls = [];

// ── Zoom / pan ─────────────────────────────────────────────────────────────
let tx = 0, ty = 0, sc = 1;
function applyTransform() {
  gEl.setAttribute('transform', `translate(${tx},${ty}) scale(${sc})`);
  updateLabelVisibility();
}

svg.addEventListener('wheel', e => {
  e.preventDefault();
  const f = e.deltaY > 0 ? 0.88 : 1.14;
  const r = svg.getBoundingClientRect();
  tx = (e.clientX - r.left) - ((e.clientX - r.left) - tx) * f;
  ty = (e.clientY - r.top)  - ((e.clientY - r.top)  - ty) * f;
  sc = Math.min(8, Math.max(0.1, sc * f));
  applyTransform();
}, { passive: false });

let panning = false, panStart = {};
svg.addEventListener('mousedown', e => {
  if (e.target === svg || e.target === gEl ||
      e.target.tagName === 'line' || e.target.tagName === 'text') {
    panning = true; wrap.classList.add('panning');
    panStart = { x: e.clientX - tx, y: e.clientY - ty };
  }
});
window.addEventListener('mousemove', e => {
  if (!panning) return;
  tx = e.clientX - panStart.x; ty = e.clientY - panStart.y; applyTransform();
});
window.addEventListener('mouseup', () => { panning = false; wrap.classList.remove('panning'); });

// ── Slider wiring ──────────────────────────────────────────────────────────
function wireSlider(id, valId, onInput) {
  const el = document.getElementById(id);
  el.addEventListener('input', () => {
    onInput(parseFloat(el.value));
    document.getElementById(valId).textContent = el.value;
    reheat();
  });
}
wireSlider('s-repulse', 'rv',  v => { REPULSE   = v; });
wireSlider('s-dist',    'ldv', v => { LINK_DIST = v; });
wireSlider('s-center',  'cfv', v => { CENTER_F  = v / 1000; });
wireSlider('s-size',    'nsv', v => { BASE_R = v; updateNodeSizes(); });

document.getElementById('btn-labels').addEventListener('click', () => {
  LABEL_MODE = LABEL_MODE === 1 ? 0 : 1;
  document.getElementById('btn-labels').textContent = LABEL_MODE === 1 ? 'On' : 'Off';
  updateLabelVisibility();
});

function updateNodeSizes() {
  nodes.forEach(n => {
    const r = BASE_R + Math.min((lc[n.id]||0) * 1.5, BASE_R);
    n._r = r;
    const el = document.getElementById('n-' + n.id);
    if (!el) return;
    el.querySelector('circle').setAttribute('r', r);
    el.querySelector('text').setAttribute('x', r + 3);
  });
}

function updateLabelVisibility() {
  nodeEls.forEach(el => {
    const text = el.querySelector('text');
    if (!text) return;
    text.style.opacity = LABEL_MODE === 1 ? 1 : 0;
  });
}

// ── Force simulation ───────────────────────────────────────────────────────
let alpha = 0;
const ALPHA_DECAY = 0.018, ALPHA_MIN = 0.001, VEL_DECAY = 0.3;
let rafId = null;

function simTick() {
  if (alpha < ALPHA_MIN) { rafId = null; return; }
  alpha *= (1 - ALPHA_DECAY);
  const collideR = BASE_R * 2.8;

  nodes.forEach(n => {
    if (n.fx == null) n.vx += (W/2 - n.x) * CENTER_F * alpha;
    if (n.fy == null) n.vy += (H/2 - n.y) * CENTER_F * alpha;
  });

  for (let i = 0; i < nodes.length; i++) {
    for (let j = i+1; j < nodes.length; j++) {
      const a = nodes[i], b = nodes[j];
      const dx = b.x-a.x, dy = b.y-a.y, d = Math.sqrt(dx*dx+dy*dy)||1;
      const f = REPULSE/(d*d)*alpha;
      if (a.fx==null){a.vx-=f*dx/d; a.vy-=f*dy/d;}
      if (b.fx==null){b.vx+=f*dx/d; b.vy+=f*dy/d;}
    }
  }

  links.forEach(l => {
    const dx = l.target.x-l.source.x, dy = l.target.y-l.source.y;
    const d = Math.sqrt(dx*dx+dy*dy)||1;
    const f = (d-LINK_DIST)/d*0.5*alpha;
    if (l.source.fx==null){l.source.vx+=f*dx; l.source.vy+=f*dy;}
    if (l.target.fx==null){l.target.vx-=f*dx; l.target.vy-=f*dy;}
  });

  for (let i = 0; i < nodes.length; i++) {
    for (let j = i+1; j < nodes.length; j++) {
      const a = nodes[i], b = nodes[j];
      const dx = b.x-a.x, dy = b.y-a.y, d = Math.sqrt(dx*dx+dy*dy)||1;
      if (d < collideR) {
        const ov = (collideR-d)/d*0.9;
        if (a.fx==null){a.vx-=dx*ov; a.vy-=dy*ov;}
        if (b.fx==null){b.vx+=dx*ov; b.vy+=dy*ov;}
      }
    }
  }

  nodes.forEach(n => {
    if (n.fx!=null){n.x=n.fx;n.vx=0;}else{n.vx*=(1-VEL_DECAY);n.x+=n.vx;}
    if (n.fy!=null){n.y=n.fy;n.vy=0;}else{n.vy*=(1-VEL_DECAY);n.y+=n.vy;}
  });

  lineEls.forEach((el,i) => {
    el.setAttribute('x1',links[i].source.x); el.setAttribute('y1',links[i].source.y);
    el.setAttribute('x2',links[i].target.x); el.setAttribute('y2',links[i].target.y);
  });
  nodeEls.forEach((el,i) => el.setAttribute('transform',`translate(${nodes[i].x},${nodes[i].y})`));
  rafId = requestAnimationFrame(simTick);
}

function reheat() {
  alpha = 0.3;
  if (!rafId) rafId = requestAnimationFrame(simTick);
}

// ── Node colour ────────────────────────────────────────────────────────────
function nodeColor(id) {
  const n = lc[id] || 0;
  if (n === 0) return '#4a4d58';
  if (n <= 2)  return '#5a7fa8';
  if (n <= 5)  return '#7b9fd4';
  return '#a8c4e8';
}

// ── Graph rebuild ──────────────────────────────────────────────────────────
function rebuildGraph(rawN, rawE) {
  // save positions before clearing
  nodes.forEach(n => nodePositions.set(n.id, { x: n.x, y: n.y }));

  alpha = 0;
  if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
  linksG.innerHTML = '';
  nodesG.innerHTML = '';
  lineEls = [];
  nodeEls = [];

  lc = {};
  rawE.forEach(e => {
    lc[e.source] = (lc[e.source]||0) + 1;
    lc[e.target] = (lc[e.target]||0) + 1;
  });

  nodes = rawN.map(n => {
    const saved = nodePositions.get(n.id);
    return {
      ...n,
      x: saved ? saved.x : W/2 + (Math.random()-.5)*260,
      y: saved ? saved.y : H/2 + (Math.random()-.5)*260,
      vx: 0, vy: 0, fx: null, fy: null,
    };
  });

  const nById = Object.fromEntries(nodes.map(n => [n.id, n]));
  links = rawE
    .map(e => ({ source: nById[e.source], target: nById[e.target] }))
    .filter(e => e.source && e.target);

  lineEls = links.map(() => {
    const el = document.createElementNS(NS, 'line');
    el.setAttribute('class', 'link');
    linksG.appendChild(el);
    return el;
  });

  nodeEls = nodes.map(n => {
    const grp = document.createElementNS(NS, 'g');
    grp.setAttribute('class', 'node');
    grp.id = 'n-' + n.id;

    const r = BASE_R + Math.min((lc[n.id]||0) * 1.5, BASE_R);
    n._r = r;

    const circle = document.createElementNS(NS, 'circle');
    circle.setAttribute('r', r);
    circle.setAttribute('fill', nodeColor(n.id));
    circle.setAttribute('stroke', '#2a2d35');
    circle.setAttribute('stroke-width', '1.5');

    const text = document.createElementNS(NS, 'text');
    text.setAttribute('dy', '0.35em');
    text.setAttribute('x', r + 3);
    text.textContent = n.id;
    text.style.opacity = LABEL_MODE === 1 ? 1 : 0;

    grp.appendChild(circle);
    grp.appendChild(text);
    nodesG.appendChild(grp);

    grp.addEventListener('mouseenter', () => {
      document.getElementById('snap-t').textContent = n.id;
      document.getElementById('snap-b').textContent = n.blurb || 'No description.';
      document.getElementById('snap').style.display = 'block';
      lineEls.forEach((el, i) => {
        const l = links[i];
        el.classList.toggle('highlighted', l.source.id === n.id || l.target.id === n.id);
      });
      text.style.opacity = 1;
    });
    grp.addEventListener('mouseleave', () => {
      document.getElementById('snap').style.display = 'none';
      lineEls.forEach(el => el.classList.remove('highlighted'));
      updateLabelVisibility();
    });

    grp.addEventListener('click', e => { e.stopPropagation(); openReader(n.id); });

    grp.addEventListener('mousedown', e => {
      e.stopPropagation();
      const rect = svg.getBoundingClientRect();
      n.fx = n.x; n.fy = n.y; reheat();
      const onMove = e2 => {
        n.fx = (e2.clientX - rect.left - tx) / sc;
        n.fy = (e2.clientY - rect.top  - ty) / sc;
      };
      const onUp = () => {
        n.fx = null; n.fy = null;
        window.removeEventListener('mousemove', onMove);
        window.removeEventListener('mouseup', onUp);
      };
      window.addEventListener('mousemove', onMove);
      window.addEventListener('mouseup', onUp);
    });

    return grp;
  });

  reheat();
}

// ── Init ───────────────────────────────────────────────────────────────────
function init(data) {
  rawNodes = data.nodes;
  rawEdges = data.edges;

  nodeById = Object.fromEntries(rawNodes.map(n => [n.id, n]));
  backlinks = {};
  rawEdges.forEach(e => {
    if (!backlinks[e.target]) backlinks[e.target] = [];
    backlinks[e.target].push(e.source);
  });

  document.getElementById('stats').textContent =
    `${rawNodes.length} notes \u00b7 ${rawEdges.length} connections`;

  renderCards(rawNodes);
  renderTable(rawNodes, rawEdges);
  rebuildGraph(rawNodes, rawEdges);

  if (currentNodeId && nodeById[currentNodeId]) {
    openReader(currentNodeId);
  }
}

function renderCards(nds) {
  const shuffled = [...nds].sort(() => Math.random() - 0.5).slice(0, 5);
  document.getElementById('cards').innerHTML = shuffled.map(n => {
    const b = n.blurb || 'No description yet.';
    return `<div class="card" onclick="openReader(${ja(n.id)})">
      <div class="card-title">${esc(n.id)}</div>
      <div class="card-blurb">${esc(b)}</div>
    </div>`;
  }).join('');
}

function renderTable(nds, edgs) {
  const outMap = {};
  edgs.forEach(e => { if (!outMap[e.source]) outMap[e.source] = []; outMap[e.source].push(e.target); });
  document.getElementById('notes-tbody').innerHTML = nds.map(n => {
    const tags = (outMap[n.id] || [])
      .map(t => `<span class="tag" onclick="openReader(${ja(t)})">${esc(t)}</span>`)
      .join('');
    return `<tr id="row-${esc(n.id)}">
      <td class="note-name" onclick="openReader(${ja(n.id)})">${esc(n.id)}</td>
      <td>${tags || '<span class="dim">\u2014</span>'}</td>
    </tr>`;
  }).join('');
}

// ── Note renderer ──────────────────────────────────────────────────────────
function renderContent(raw, ext) {
  const blocks = [];
  let text = raw.replace(/\$\$[\s\S]*?\$\$/g, m => {
    blocks.push(m.slice(2,-2).trim()); return '\x00BLOCK'+(blocks.length-1)+'\x00';
  });
  if (ext==='typ') {
    text = text.replace(/^\$\n([\s\S]*?)\n\$$/gm, (_,inner) => {
      blocks.push(inner.trim()); return '\x00BLOCK'+(blocks.length-1)+'\x00';
    });
    text = text.replace(/^#(import|set|show|let)[^\n]*/gm,'');
  }
  const lines = text.split('\n'), out = [];
  let inList = false;
  for (const l of lines) {
    if (/^=== /.test(l))      {if(inList){out.push('</ul>');inList=false;}out.push('<h3>'+inline(l.slice(4),ext)+'</h3>');continue;}
    if (/^== /.test(l))       {if(inList){out.push('</ul>');inList=false;}out.push('<h2>'+inline(l.slice(3),ext)+'</h2>');continue;}
    if (/^= /.test(l))        {if(inList){out.push('</ul>');inList=false;}out.push('<h1>'+inline(l.slice(2),ext)+'</h1>');continue;}
    if (/^### /.test(l))      {if(inList){out.push('</ul>');inList=false;}out.push('<h3>'+inline(l.slice(4),ext)+'</h3>');continue;}
    if (/^## /.test(l))       {if(inList){out.push('</ul>');inList=false;}out.push('<h2>'+inline(l.slice(3),ext)+'</h2>');continue;}
    if (/^# /.test(l))        {if(inList){out.push('</ul>');inList=false;}out.push('<h1>'+inline(l.slice(2),ext)+'</h1>');continue;}
    if (/^---+$/.test(l.trim())){if(inList){out.push('</ul>');inList=false;}out.push('<hr>');continue;}
    if (/^\x00BLOCK\d+\x00$/.test(l.trim())){
      if(inList){out.push('</ul>');inList=false;}
      out.push('<div class="math-block">'+esc(blocks[parseInt(l.match(/\d+/)[0])])+'</div>');continue;
    }
    if (/^[-*] /.test(l)){if(!inList){out.push('<ul>');inList=true;}out.push('<li>'+inline(l.slice(2),ext)+'</li>');continue;}
    if (l.trim()===''){if(inList){out.push('</ul>');inList=false;}continue;}
    if (inList){out.push('</ul>');inList=false;}
    out.push('<p>'+inline(l,ext)+'</p>');
  }
  if (inList) out.push('</ul>');
  return out.join('\n');
}

function inline(s, ext) {
  s = s.replace(/\[\[([^\]|]+)(?:\|([^\]]+))?\]\]/g, (_,target,alias) => {
    const id = target.trim().replace(/\.[a-z]+$/,'');
    return `<span class="wikilink" onclick='openReader(${ja(id)})'>${esc((alias||id).trim())}</span>`;
  });
  s = s.replace(/\$([^$\n]+)\$/g, (_,m) => `<span class="math-inline">${esc(m)}</span>`);
  s = s.replace(/\*\*\*(.+?)\*\*\*/g, (_,m) => `<strong><em>${esc(m)}</em></strong>`);
  s = s.replace(/\*\*(.+?)\*\*/g,     (_,m) => `<strong>${esc(m)}</strong>`);
  s = s.replace(/\*(.+?)\*/g,         (_,m) => `<em>${esc(m)}</em>`);
  s = s.replace(/_([^_\n]+)_/g,       (_,m) => `<em>${esc(m)}</em>`);
  if (/^> /.test(s)) s = `<blockquote>${s.slice(2)}</blockquote>`;
  return s;
}

// HTML-escape for text content
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
// JSON.stringify + escape quotes for use inside HTML attributes
function ja(s) {
  return JSON.stringify(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;');
}

// ── Reader panel ───────────────────────────────────────────────────────────
function panToNode(n) {
  const targetTx = W/2 - n.x * sc;
  const targetTy = H/2 - n.y * sc;
  const startTx = tx, startTy = ty;
  const startTime = performance.now();
  const duration = 420;
  function step(now) {
    const t = Math.min(1, (now - startTime) / duration);
    const ease = t < 0.5 ? 2*t*t : -1 + (4 - 2*t)*t;
    tx = startTx + (targetTx - startTx) * ease;
    ty = startTy + (targetTy - startTy) * ease;
    applyTransform();
    if (t < 1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

let readerFullscreen = false;

function toggleFullscreen() {
  const r = document.getElementById('reader');
  readerFullscreen = !readerFullscreen;
  r.classList.toggle('fullscreen', readerFullscreen);
  document.getElementById('reader-fs').textContent = readerFullscreen ? '\u2715' : '\u26F6';
  document.getElementById('reader-fs').title = readerFullscreen ? 'Exit fullscreen' : 'Fullscreen';
  document.getElementById('reader-close').style.display = readerFullscreen ? 'none' : '';
}

function openReader(id) {
  const n = nodeById[id];
  if (!n) return;
  currentNodeId = id;

  const simNode = nodes.find(nd => nd.id === id);
  if (simNode && !readerFullscreen) panToNode(simNode);

  document.getElementById('reader-title').textContent = n.id;
  const body = document.getElementById('reader-body');
  body.innerHTML = renderContent(n.content, n.ext);
  body.scrollTop = 0;
  document.getElementById('reader').classList.add('open');

  const rawOut = rawEdges.filter(e => e.source === id).map(e => e.target);
  const rawIn  = backlinks[id] || [];
  document.getElementById('reader-out').innerHTML = rawOut.length
    ? rawOut.map(t => `<span class="rtag" onclick='openReader(${ja(t)})'>${esc(t)}</span>`).join('')
    : '<span class="rnone">none</span>';
  document.getElementById('reader-in').innerHTML = rawIn.length
    ? rawIn.map(s => `<span class="rtag" onclick='openReader(${ja(s)})'>${esc(s)}</span>`).join('')
    : '<span class="rnone">none</span>';

  document.querySelectorAll('.node.focused').forEach(el => el.classList.remove('focused'));
  const el = document.getElementById('n-' + id);
  if (el) el.classList.add('focused');

  if (!readerFullscreen) {
    const row = document.getElementById('row-' + id);
    if (row) {
      document.querySelectorAll('tr.hl').forEach(r => r.classList.remove('hl'));
      row.classList.add('hl');
      row.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }
  }
}

function closeReader() {
  if (readerFullscreen) {
    readerFullscreen = false;
    document.getElementById('reader').classList.remove('fullscreen');
  }
  document.getElementById('reader').classList.remove('open');
  document.getElementById('reader-fs').textContent = '\u26F6';
  document.getElementById('reader-fs').title = 'Fullscreen';
  document.getElementById('reader-close').style.display = '';
  document.querySelectorAll('.node.focused').forEach(el => el.classList.remove('focused'));
  currentNodeId = null;
}

function openInNeovim() {
  if (!currentNodeId) return;
  const n = nodeById[currentNodeId];
  if (!n) return;
  fetch('/open', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ file: n.id + '.' + n.ext }),
  }).catch(() => {});
}

// ── Live reload via SSE ────────────────────────────────────────────────────
const es = new EventSource('/events');
es.addEventListener('message', () => {
  fetch('/data').then(r => r.json()).then(init).catch(() => {});
});

// ── Initial load ───────────────────────────────────────────────────────────
fetch('/data')
  .then(r => r.json())
  .then(init)
  .catch(() => { document.getElementById('stats').textContent = 'Failed to load data'; });
</script>
